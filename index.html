<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo app</title>
    <link rel="icon" href="assets/images/favicon-32x32.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="header-content">
                    <h1>TODO</h1>
          <img id="theme-toggle" src="assets/images/icon-moon.svg" alt="Toggle Theme">
                  </div>


    </header>


<main>
  <div class="main-container">

    <!-- Add Todo -->
    <section class="add-todo dark">
      <input id="todo-input" type="text" placeholder="Create a new todo...">
    </section>

    <!-- Todo List -->
    <ul class="todo-list"></ul>

    <!-- Filters -->
    <section class="todo-filters">
      <button id="all-items">All</button>
      <button id="active-items">Active</button>
      <button id="completed-items">Completed</button>
      <button id="clear-completed">Clear Completed</button>
    </section>

  </div>
</main>    <script src="index.js"></script>
</body>
</html>
